name: Update vcpkg Versions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

    paths:
      - "ports/**/vcpkg.json"

permissions:
  contents: write # required to push commit to PR branch

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone and bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Format all port manifests
        run: |
          find ./ports -type f -name vcpkg.json -print0 | while IFS= read -r -d '' manifest; do
            echo "Formatting ${manifest}"
            ./vcpkg/vcpkg format-manifest "${manifest}"
          done

      - name: Run x-add-version for all ports
        run: |
          ./vcpkg/vcpkg \
            --x-builtin-ports-root=./ports \
            --x-builtin-registry-versions-dir=./versions \
            x-add-version --all --verbose

      - name: Commit updated versions and manifests
        run: |
          if ! git diff --quiet; then
            echo "Committing updated versions and formatted manifests..."

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add versions
            find ./ports -type f -name vcpkg.json -print0 | xargs -0 git add
            git commit -m "chore: update vcpkg versions files"

            # Push explicitly to the PR branch
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No version or manifest updates needed."
          fi
